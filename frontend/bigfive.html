
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深海人格探索 · 心晴</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap');

:root {
  --ink:        #0d0d1a;
  --ink-soft:   #2a2a4a;
  --surface:    #0f0f2e;
  --glass:      rgba(255,255,255,0.04);
  --glass-b:    rgba(255,255,255,0.08);
  --accent:     #7c6cf0;
  --accent2:    #c084fc;
  --gold:       #f0c060;
  --teal:       #4dd9c0;
  --white:      #e8e4ff;
  --muted:      rgba(200,190,255,0.5);
  --border:     rgba(180,160,255,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--surface);
  color: var(--white);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Stars background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 15% 25%, rgba(124,108,240,0.18) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 75%, rgba(192,132,252,0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(77,217,192,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ── Layout ── */
#app {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px 80px;
}

/* ── Cover ── */
#cover {
  max-width: 560px;
  width: 100%;
  text-align: center;
  padding-top: 60px;
}

.cover-eyebrow {
  font-size: 0.72rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--teal);
  margin-bottom: 28px;
  opacity: 0.8;
}

.cover-title {
  font-family: 'Noto Serif SC', serif;
  font-size: clamp(2rem, 5vw, 3.2rem);
  font-weight: 700;
  line-height: 1.15;
  margin-bottom: 18px;
  background: linear-gradient(135deg, var(--white) 30%, var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.cover-sub {
  font-size: 0.95rem;
  color: var(--muted);
  line-height: 1.8;
  margin-bottom: 48px;
}

.ocean-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  margin-bottom: 48px;
}

.ocean-tag {
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 0.8rem;
  letter-spacing: 0.05em;
  border: 1px solid;
}
.tag-O { color: #60a5fa; border-color: rgba(96,165,250,0.3); background: rgba(96,165,250,0.06); }
.tag-C { color: #4ade80; border-color: rgba(74,222,128,0.3); background: rgba(74,222,128,0.06); }
.tag-E { color: #fbbf24; border-color: rgba(251,191,36,0.3); background: rgba(251,191,36,0.06); }
.tag-A { color: #f472b6; border-color: rgba(244,114,182,0.3); background: rgba(244,114,182,0.06); }
.tag-N { color: var(--accent2); border-color: rgba(192,132,252,0.3); background: rgba(192,132,252,0.06); }

.start-btn {
  padding: 16px 48px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white;
  border: none;
  border-radius: 32px;
  font-size: 1.05rem;
  font-family: 'Noto Serif SC', serif;
  cursor: pointer;
  letter-spacing: 0.08em;
  box-shadow: 0 8px 32px rgba(124,108,240,0.4);
  transition: all 0.3s;
}
.start-btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 14px 40px rgba(124,108,240,0.5);
}

.cover-note {
  margin-top: 20px;
  font-size: 0.75rem;
  color: rgba(200,190,255,0.35);
  line-height: 1.6;
}

/* ── Chat Interface ── */
#chat-view {
  display: none;
  width: 100%;
  max-width: 700px;
}

.chat-header {
  text-align: center;
  padding: 20px 0 28px;
}

.chat-header-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.1rem;
  color: var(--muted);
  letter-spacing: 0.06em;
}

.progress-wrap {
  margin: 0 0 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.progress-bar-bg {
  flex: 1;
  height: 3px;
  background: rgba(180,160,255,0.1);
  border-radius: 3px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--teal));
  border-radius: 3px;
  transition: width 0.6s ease;
}

.progress-label {
  font-size: 0.75rem;
  color: var(--muted);
  white-space: nowrap;
}

/* Messages */
.messages {
  display: flex;
  flex-direction: column;
  gap: 18px;
  min-height: 200px;
  margin-bottom: 20px;
}

.msg {
  display: flex;
  gap: 12px;
  animation: msgIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(16px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.msg.ai { align-self: flex-start; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }

.msg-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
}

.msg.ai .msg-avatar {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
}

.msg.user .msg-avatar {
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--border);
}

.msg-bubble {
  max-width: 80%;
  padding: 14px 18px;
  border-radius: 18px;
  font-size: 0.95rem;
  line-height: 1.7;
}

.msg.ai .msg-bubble {
  background: var(--glass-b);
  border: 1px solid var(--border);
  color: var(--white);
  border-bottom-left-radius: 4px;
}

.msg.user .msg-bubble {
  background: linear-gradient(135deg, rgba(124,108,240,0.35), rgba(192,132,252,0.25));
  border: 1px solid rgba(124,108,240,0.25);
  color: var(--white);
  border-bottom-right-radius: 4px;
}

/* Typing indicator */
.typing-bubble {
  background: var(--glass-b);
  border: 1px solid var(--border);
  border-radius: 18px;
  border-bottom-left-radius: 4px;
  padding: 14px 18px;
  display: flex;
  gap: 5px;
  align-items: center;
}

.typing-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--muted);
  animation: dotBounce 1.2s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes dotBounce {
  0%,80%,100% { transform: translateY(0); opacity: 0.4; }
  40% { transform: translateY(-6px); opacity: 1; }
}

/* Input area */
.input-wrap {
  background: var(--glass-b);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 14px 16px;
  transition: border-color 0.2s;
}

.input-wrap:focus-within {
  border-color: rgba(124,108,240,0.4);
  box-shadow: 0 0 0 3px rgba(124,108,240,0.08);
}

.input-wrap textarea {
  width: 100%;
  background: none;
  border: none;
  outline: none;
  color: var(--white);
  font-size: 0.95rem;
  font-family: 'Noto Sans SC', sans-serif;
  resize: none;
  line-height: 1.6;
  min-height: 52px;
  max-height: 160px;
}

.input-wrap textarea::placeholder { color: rgba(200,190,255,0.3); }

.input-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
}

.input-hint {
  font-size: 0.75rem;
  color: rgba(200,190,255,0.3);
}

.send-btn {
  padding: 8px 22px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white;
  border: none;
  border-radius: 20px;
  font-size: 0.88rem;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 16px rgba(124,108,240,0.3);
}
.send-btn:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(124,108,240,0.45);
}
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Result ── */
#result-view {
  display: none;
  width: 100%;
  max-width: 640px;
}

.result-header {
  text-align: center;
  margin-bottom: 36px;
}

.result-score-code {
  display: inline-block;
  font-family: 'Courier New', monospace;
  font-size: 1rem;
  letter-spacing: 0.12em;
  color: var(--accent2);
  background: rgba(192,132,252,0.1);
  border: 1px solid rgba(192,132,252,0.25);
  padding: 7px 22px;
  border-radius: 24px;
  margin-bottom: 18px;
}

.result-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.8rem;
  color: var(--white);
  margin-bottom: 8px;
}

.result-sub {
  color: var(--muted);
  font-size: 0.88rem;
}

/* Radar */
.radar-card {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 28px;
  margin-bottom: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.radar-card h3 {
  font-size: 0.85rem;
  color: var(--muted);
  letter-spacing: 0.08em;
  margin-bottom: 20px;
  align-self: flex-start;
}

/* Dimension cards */
.dim-cards {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-bottom: 28px;
}

.dim-card {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 20px 22px;
  border-left: 4px solid transparent;
}

.dim-card-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.dim-name {
  font-family: 'Noto Serif SC', serif;
  font-size: 1rem;
  font-weight: 600;
}

.dim-score {
  font-size: 1.5rem;
  font-weight: 700;
}

.dim-bar-bg {
  height: 5px;
  background: rgba(255,255,255,0.06);
  border-radius: 5px;
  overflow: hidden;
  margin-bottom: 10px;
}

.dim-bar-fill {
  height: 100%;
  border-radius: 5px;
  transition: width 1.2s cubic-bezier(0.34,1.56,0.64,1);
}

.dim-level {
  font-size: 0.75rem;
  font-weight: 600;
  margin-bottom: 6px;
}

.dim-desc {
  font-size: 0.87rem;
  color: rgba(200,190,255,0.65);
  line-height: 1.65;
}

/* AI insight */
.ai-insight-card {
  background: linear-gradient(135deg, rgba(124,108,240,0.1), rgba(192,132,252,0.08));
  border: 1px solid rgba(124,108,240,0.2);
  border-radius: 20px;
  padding: 24px;
  margin-bottom: 24px;
}

.ai-insight-card h3 {
  font-family: 'Noto Serif SC', serif;
  font-size: 1rem;
  color: var(--accent2);
  margin-bottom: 14px;
}

.ai-insight-card p {
  font-size: 0.9rem;
  line-height: 1.8;
  color: rgba(220,210,255,0.85);
  white-space: pre-wrap;
}

/* Save area */
.save-area { text-align: center; }

.save-btn {
  padding: 15px 52px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white;
  border: none;
  border-radius: 32px;
  font-size: 1rem;
  font-family: 'Noto Serif SC', serif;
  cursor: pointer;
  letter-spacing: 0.06em;
  box-shadow: 0 8px 32px rgba(124,108,240,0.4);
  transition: all 0.25s;
  display: block;
  width: 100%;
  max-width: 320px;
  margin: 0 auto 12px;
}
.save-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 12px 40px rgba(124,108,240,0.5);
}
.save-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.retry-btn {
  background: none;
  border: none;
  color: rgba(200,190,255,0.35);
  font-size: 0.82rem;
  cursor: pointer;
  font-family: inherit;
  display: block;
  margin: 0 auto;
  text-decoration: underline;
}

.saved-tip {
  margin-top: 12px;
  font-size: 0.85rem;
  color: var(--teal);
  text-align: center;
}
</style>
</head>
<body>
<div id="app">

<!-- ══════════ COVER ══════════ -->
<div id="cover">
  <div class="cover-eyebrow">OCEAN · 大五人格 · AI 深度评估</div>
  <h1 class="cover-title">探索你的<br>深海人格</h1>
  <p class="cover-sub">
    不用勾选 1~5，用你自己的话描述你自己。<br>
    AI 会通过对话理解你，生成专属的人格报告。<br>
    描述越细腻，画像越精准。
  </p>
  <div class="ocean-tags">
    <span class="ocean-tag tag-O">O 开放性</span>
    <span class="ocean-tag tag-C">C 尽责性</span>
    <span class="ocean-tag tag-E">E 外向性</span>
    <span class="ocean-tag tag-A">A 宜人性</span>
    <span class="ocean-tag tag-N">N 情绪稳定性</span>
  </div>
  <button class="start-btn" onclick="startChat()">开始探索 →</button>
  <p class="cover-note">基于 OCEAN 大五人格理论 · AI 智能分析 · 约需 5~10 分钟</p>
</div>

<!-- ══════════ CHAT VIEW ══════════ -->
<div id="chat-view">
  <div class="chat-header">
    <div class="chat-header-title">✦ 深海人格探索</div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progressLabel">开始对话</div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-wrap" id="inputWrap">
    <textarea
      id="userInput"
      placeholder="用你自己的话描述……越真实越好"
      rows="2"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <div class="input-footer">
      <span class="input-hint">Enter 发送 · Shift+Enter 换行</span>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">发 送</button>
    </div>
  </div>
</div>

<!-- ══════════ RESULT VIEW ══════════ -->
<div id="result-view">
  <div class="result-header">
    <div class="result-score-code" id="scoreCode">O··-C··-E··-A··-N··</div>
    <h2 class="result-title">你的人格画像</h2>
    <p class="result-sub">由 AI 根据你的真实描述生成</p>
  </div>

  <div class="radar-card">
    <h3>OCEAN 五维度雷达图</h3>
    <canvas id="radarCanvas" width="300" height="300"></canvas>
  </div>

  <div class="dim-cards" id="dimCards"></div>

  <div class="ai-insight-card" id="insightCard" style="display:none">
    <h3>🔮 AI 人格洞察</h3>
    <p id="insightText"></p>
  </div>

  <div class="save-area">
    <button class="save-btn" id="saveBtn" onclick="saveResult()">保存到我的档案</button>
    <button class="retry-btn" onclick="retryTest()">重新探索</button>
    <div class="saved-tip" id="savedTip" style="display:none"></div>
  </div>
</div>

</div><!-- #app -->

<script>
// ─────────────────────────────────────────────────────────
// Config
// ─────────────────────────────────────────────────────────
const API = 'https://to-feel-good.store/api/ai/chat';

const DIM_INFO = {
  O: { label:'开放性',    color:'#60a5fa', desc_high:'你充满好奇，思维开阔，对艺术、哲学和新想法怀有热情，想象力是你最大的财富。', desc_low:'你务实稳重，重视经验和传统，知道什么真正有价值。', desc_mid:'你在好奇与务实之间保持平衡，既欣赏新想法，也看重已验证的经验。' },
  C: { label:'尽责性',    color:'#4ade80', desc_high:'你自律勤奋，做事有始有终，设定目标并坚定前进，值得他人信赖。', desc_low:'你灵活随性，善于在变化中即兴发挥，不受条框束缚。', desc_mid:'你知道何时该认真规划，何时随遇而安，在自律与灵活间找到了节奏。' },
  E: { label:'外向性',    color:'#fbbf24', desc_high:'你精力充沛，在社交场合如鱼得水，能给周围人带来活力与欢笑。', desc_low:'你享受安静与独处，思维深邃，独处是你充电的方式。', desc_mid:'你在外向与内向之间保持平衡，既能享受热闹，也能在独处中找到满足。' },
  A: { label:'宜人性',    color:'#f472b6', desc_high:'你温柔体贴，富有同理心，真心关注他人感受，是大家可以依靠的人。', desc_low:'你直率独立，有自己清晰的判断和立场，不轻易被他人期待左右。', desc_mid:'你既能关爱他人，也能在必要时坚守界限，懂得平衡付出与自我。' },
  N: { label:'情绪稳定性', color:'#c084fc', desc_high:'你情绪稳定，心理弹性强，面对压力也能保持冷静，是周围人的定海神针。', desc_low:'你情感世界丰富细腻，对外界感知敏锐，这份敏感是感受美好的天赋。', desc_mid:'你对情绪有良好觉察，既不过分压抑，也不轻易失控，懂得与自己的感受和解。' },
};

// ─────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────
let conversationHistory = [];   // {role, content}
let questionCount = 0;
let maxQuestions = 25;          // AI 动态调整，这是初始值
let isTyping = false;
let finalScores = null;
let aiInsight = '';
let sessionStarted = false;

// ─────────────────────────────────────────────────────────
// UI Helpers
// ─────────────────────────────────────────────────────────
function appendMsg(role, text) {
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'ai' ? '✦' : '我';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;

  div.appendChild(avatar);
  div.appendChild(bubble);
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
  return bubble;
}

function showTyping() {
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typingIndicator';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = '✦';

  const bubble = document.createElement('div');
  bubble.className = 'typing-bubble';
  for (let i = 0; i < 3; i++) {
    const dot = document.createElement('div');
    dot.className = 'typing-dot';
    bubble.appendChild(dot);
  }

  div.appendChild(avatar);
  div.appendChild(bubble);
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function updateProgress() {
  const pct = Math.min(100, Math.round((questionCount / maxQuestions) * 100));
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent =
    questionCount >= maxQuestions ? '分析中...' : `第 ${questionCount} 题 / 约 ${maxQuestions} 题`;
}

function setInputEnabled(enabled) {
  document.getElementById('userInput').disabled = !enabled;
  document.getElementById('sendBtn').disabled = !enabled;
  if (enabled) document.getElementById('userInput').focus();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// ─────────────────────────────────────────────────────────
// System Prompt
// ─────────────────────────────────────────────────────────
function buildSystemPrompt() {
  var p = [];
  p.push("你是一位温和专业的心理咨询师，正在通过开放式对话评估用户的大五人格（OCEAN模型）。");
  p.push("");
  p.push("你的任务：");
  p.push("1. 通过自然对话，逐渐了解用户在五个维度上的特质：开放性(O)、尽责性(C)、外向性(E)、宜人性(A)、情绪稳定性(N)");
  p.push("2. 每次只问一个问题，问题要自然、温暖、开放式");
  p.push("3. 根据用户回答的详细程度决定继续追问还是转换维度");
  p.push("4. 如果用户回答很详细丰富，约20题后可以结束；如果描述简单，需要约30题");
  p.push("");
  p.push("重要规则：");
  p.push("- 保持对话自然流畅，像朋友聊天，不要像填问卷");
  p.push("- 问题要多样化，覆盖生活、工作、社交、情绪各个方面");
  p.push("- 不要直接问用户的开放性怎么样，要通过具体情境来了解");
  p.push("- 每轮只输出一个问题，不要同时问多个问题");
  p.push("");
  p.push("当你判断收集了足够信息时（约20-30个问题后），请严格按以下格式输出JSON来结束对话：");
  p.push("PERSONALITY_RESULT:{" + '"O":75,"C":60,"E":45,"A":80,"N":55,"insight":"人格洞察","ready":true' + "}");
  p.push("注意：O/C/E/A/N均为0-100的整数，insight为200字以内的温柔文学性人格解读，ready固定为true。");
  p.push("");
  p.push("现在开始，先用一句温暖的开场白然后问第一个问题。");
  return p.join("\n");
}

// ─────────────────────────────────────────────────────────
// Start
// ─────────────────────────────────────────────────────────
async function startChat() {
  document.getElementById('cover').style.display = 'none';
  document.getElementById('chat-view').style.display = 'block';
  sessionStarted = true;
  setInputEnabled(false);
  showTyping();

  const systemPrompt = buildSystemPrompt();
  conversationHistory = [];

  try {
    const reply = await callAI(systemPrompt, '请开始对话，给出开场白和第一个问题。');
    removeTyping();
    if (!processReply(reply)) {
      appendMsg('ai', reply);
    }
    questionCount = 1;
    updateProgress();
    setInputEnabled(true);
  } catch (e) {
    removeTyping();
    appendMsg('ai', '抱歉，连接出现问题，请刷新重试～');
  }
}

// ─────────────────────────────────────────────────────────
// Send Message
// ─────────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isTyping) return;

  appendMsg('user', text);
  conversationHistory.push({ role: 'user', content: text });
  input.value = '';
  input.style.height = 'auto';

  isTyping = true;
  setInputEnabled(false);
  showTyping();

  try {
    const systemPrompt = buildSystemPrompt();
    const reply = await callAI(systemPrompt, null);
    removeTyping();

    if (!processReply(reply)) {
      appendMsg('ai', reply);
      conversationHistory.push({ role: 'assistant', content: reply });
      questionCount++;
      updateProgress();
      setInputEnabled(true);
    }
  } catch (e) {
    removeTyping();
    appendMsg('ai', '网络有点不稳定，请重试～');
    setInputEnabled(true);
  }
  isTyping = false;
}

// ─────────────────────────────────────────────────────────
// Call AI via backend /api/ai/chat
// Packs full conversation context into a single message string
// ─────────────────────────────────────────────────────────
async function callAI(systemPrompt, firstUserMsg) {
  const token = localStorage.getItem('access_token');

  // Build a single prompt that includes system role + full history
  let fullPrompt = '';

  if (firstUserMsg) {
    // First call: just system + trigger
    fullPrompt = `[系统指令]\n${systemPrompt}\n\n[开始对话]`;
  } else {
    // Subsequent calls: system + history
    let historyText = conversationHistory.map(m =>
      `${m.role === 'user' ? '用户' : 'AI'}：${m.content}`
    ).join('\n\n');
    fullPrompt = `[系统指令]\n${systemPrompt}\n\n[对话记录]\n${historyText}\n\n[请继续，只输出下一个问题或最终JSON结果]`;
  }

  const res = await fetch(API, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      ...(token ? { 'Authorization': `Bearer ${token}` } : {})
    },
    body: JSON.stringify({ message: fullPrompt })
  });

  if (!res.ok) throw new Error('API error ' + res.status);
  const data = await res.json();
  return data.reply || data.message || '';
}

// ─────────────────────────────────────────────────────────
// Process Reply — detect if AI returned result JSON
// ─────────────────────────────────────────────────────────
function processReply(text) {
  const marker = 'PERSONALITY_RESULT:';
  const idx = text.indexOf(marker);
  if (idx === -1) return false;

  try {
    const jsonStr = text.substring(idx + marker.length).trim();
    const data = JSON.parse(jsonStr);

    if (data.ready && data.O !== undefined) {
      finalScores = { O: data.O, C: data.C, E: data.E, A: data.A, N: data.N };
      aiInsight = data.insight || '';

      // Show any text before the JSON as last AI message
      const preText = text.substring(0, idx).trim();
      if (preText) appendMsg('ai', preText);

      // Transition to result
      setTimeout(() => showResult(), 800);
      document.getElementById('inputWrap').style.display = 'none';
      document.getElementById('progressLabel').textContent = '分析完成 ✓';
      document.getElementById('progressFill').style.width = '100%';
      return true;
    }
  } catch(e) {
    console.error('Parse result failed', e);
  }
  return false;
}

// ─────────────────────────────────────────────────────────
// Show Result
// ─────────────────────────────────────────────────────────
function showResult() {
  document.getElementById('chat-view').style.display = 'none';
  const rv = document.getElementById('result-view');
  rv.style.display = 'block';

  const s = finalScores;
  const scoreStr = `O${s.O}-C${s.C}-E${s.E}-A${s.A}-N${s.N}`;
  document.getElementById('scoreCode').textContent = scoreStr;

  // Radar
  drawRadar(s);

  // Dim cards
  const cards = document.getElementById('dimCards');
  cards.innerHTML = '';
  ['O','C','E','A','N'].forEach(d => {
    const info = DIM_INFO[d];
    const score = s[d];
    let level, levelColor;
    if (score >= 65)      { level = '偏高'; levelColor = info.color; }
    else if (score <= 35) { level = '偏低'; levelColor = 'rgba(200,190,255,0.4)'; }
    else                  { level = '居中'; levelColor = 'rgba(200,190,255,0.55)'; }

    const desc = score >= 65 ? info.desc_high : score <= 35 ? info.desc_low : info.desc_mid;

    const card = document.createElement('div');
    card.className = 'dim-card';
    card.style.borderLeftColor = info.color;
    card.innerHTML = `
      <div class="dim-card-top">
        <span class="dim-name" style="color:${info.color}">${info.label}</span>
        <span class="dim-score" style="color:${info.color}">${score}</span>
      </div>
      <div class="dim-bar-bg">
        <div class="dim-bar-fill" style="width:0%;background:${info.color}" data-w="${score}%"></div>
      </div>
      <div class="dim-level" style="color:${levelColor}">${level}</div>
      <div class="dim-desc">${desc}</div>
    `;
    cards.appendChild(card);
  });

  setTimeout(() => {
    document.querySelectorAll('.dim-bar-fill').forEach(b => {
      b.style.width = b.dataset.w;
    });
  }, 100);

  // AI insight
  if (aiInsight) {
    document.getElementById('insightCard').style.display = 'block';
    document.getElementById('insightText').textContent = aiInsight;
  }

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─────────────────────────────────────────────────────────
// Radar (Canvas)
// ─────────────────────────────────────────────────────────
function drawRadar(s) {
  const canvas = document.getElementById('radarCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2, R = Math.min(W,H)*0.36;
  const labels = ['O 开放','C 尽责','E 外向','A 宜人','N 稳定'];
  const hexColors = ['#60a5fa','#4ade80','#fbbf24','#f472b6','#c084fc'];
  const vals = [s.O,s.C,s.E,s.A,s.N].map(v=>v/100);
  const n = 5;
  ctx.clearRect(0,0,W,H);

  // Grid rings
  for (let ring=1;ring<=5;ring++) {
    const r = R*ring/5;
    ctx.beginPath();
    for (let i=0;i<n;i++) {
      const a=(Math.PI*2*i/n)-Math.PI/2;
      i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
    }
    ctx.closePath();
    ctx.strokeStyle='rgba(180,160,255,0.08)';ctx.lineWidth=1;ctx.stroke();
  }

  // Axes
  for (let i=0;i<n;i++) {
    const a=(Math.PI*2*i/n)-Math.PI/2;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+R*Math.cos(a),cy+R*Math.sin(a));
    ctx.strokeStyle='rgba(180,160,255,0.12)';ctx.lineWidth=1;ctx.stroke();
  }

  // Fill
  ctx.beginPath();
  for (let i=0;i<n;i++) {
    const a=(Math.PI*2*i/n)-Math.PI/2,r=R*vals[i];
    i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a)):ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
  }
  ctx.closePath();
  ctx.fillStyle='rgba(124,108,240,0.15)';ctx.fill();
  ctx.strokeStyle='rgba(124,108,240,0.6)';ctx.lineWidth=2;ctx.stroke();

  // Dots
  for (let i=0;i<n;i++) {
    const a=(Math.PI*2*i/n)-Math.PI/2,r=R*vals[i];
    ctx.beginPath();ctx.arc(cx+r*Math.cos(a),cy+r*Math.sin(a),4.5,0,Math.PI*2);
    ctx.fillStyle=hexColors[i];ctx.fill();
  }

  // Labels
  ctx.font="500 11px 'Noto Sans SC',sans-serif";ctx.textAlign='center';ctx.textBaseline='middle';
  for (let i=0;i<n;i++) {
    const a=(Math.PI*2*i/n)-Math.PI/2;
    ctx.fillStyle=hexColors[i];
    ctx.fillText(labels[i],cx+(R+26)*Math.cos(a),cy+(R+26)*Math.sin(a));
  }
}

// ─────────────────────────────────────────────────────────
// Save
// ─────────────────────────────────────────────────────────
async function saveResult() {
  const token = localStorage.getItem('access_token');
  if (!token) { alert('请先登录后再保存结果'); return; }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = '保存中...';

  const s = finalScores;
  const scoreStr = `O${s.O}-C${s.C}-E${s.E}-A${s.A}-N${s.N}`;

  try {
    const res = await fetch('https://to-feel-good.store/api/users/me/big_five', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${token}` },
      body: JSON.stringify({ result: scoreStr })
    });
    if (!res.ok) throw new Error((await res.json()).detail || '保存失败');

    localStorage.setItem('bf_score_result', scoreStr);
    localStorage.setItem('bf_score_timestamp', Date.now().toString());

    btn.textContent = '✓ 已保存到档案';
    btn.style.background = 'linear-gradient(135deg,#4ade80,#22d3ee)';

    document.getElementById('savedTip').style.display = 'block';
    document.getElementById('savedTip').textContent = `得分码 ${scoreStr} 已同步到个人档案`;

    if (window.opener) {
      window.opener.postMessage({ type: 'BF_SAVED', score: scoreStr }, '*');
      setTimeout(() => window.close(), 1800);
    }
  } catch(e) {
    btn.disabled = false;
    btn.textContent = '保存到我的档案';
    alert('保存失败：' + e.message);
  }
}

function retryTest() {
  if (!confirm('确定重新开始？当前结果将被清除。')) return;
  location.reload();
}
