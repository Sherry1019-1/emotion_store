
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大五人格测试 · 心晴</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap');

:root {
  --ink: #1a1035;
  --ink-soft: #3d3460;
  --paper: #faf8f4;
  --paper-warm: #f5f0e8;
  --accent: #7c5cbf;
  --accent-light: #b39ddb;
  --accent-glow: rgba(124,92,191,0.15);
  --gold: #c9a84c;
  --danger: #e57373;

  --O: #5c8dd6;
  --C: #56b888;
  --E: #e8a44a;
  --A: #e06b8b;
  --N: #9b72cf;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--paper);
  color: var(--ink);
  min-height: 100vh;
}

/* ===== 封面页 ===== */
#cover {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 24px;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(124,92,191,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 80%, rgba(201,168,76,0.07) 0%, transparent 60%),
    var(--paper);
  text-align: center;
}

.cover-badge {
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--accent);
  border: 1px solid var(--accent-light);
  padding: 5px 16px;
  border-radius: 20px;
  margin-bottom: 32px;
  background: var(--accent-glow);
}

.cover-title {
  font-family: 'Noto Serif SC', serif;
  font-size: clamp(2.2rem, 5vw, 3.5rem);
  font-weight: 700;
  line-height: 1.2;
  color: var(--ink);
  margin-bottom: 16px;
}

.cover-title span {
  color: var(--accent);
}

.cover-sub {
  font-size: 1rem;
  color: var(--ink-soft);
  line-height: 1.7;
  max-width: 440px;
  margin-bottom: 40px;
  font-weight: 300;
}

.ocean-row {
  display: flex;
  gap: 12px;
  margin-bottom: 48px;
  flex-wrap: wrap;
  justify-content: center;
}

.ocean-tag {
  padding: 8px 18px;
  border-radius: 24px;
  font-size: 0.88rem;
  font-weight: 500;
  letter-spacing: 0.03em;
}

.tag-O { background: rgba(92,141,214,0.12); color: var(--O); border: 1px solid rgba(92,141,214,0.3); }
.tag-C { background: rgba(86,184,136,0.12); color: var(--C); border: 1px solid rgba(86,184,136,0.3); }
.tag-E { background: rgba(232,164,74,0.12); color: var(--E); border: 1px solid rgba(232,164,74,0.3); }
.tag-A { background: rgba(224,107,139,0.12); color: var(--A); border: 1px solid rgba(224,107,139,0.3); }
.tag-N { background: rgba(155,114,207,0.12); color: var(--N); border: 1px solid rgba(155,114,207,0.3); }

.gender-select {
  margin-bottom: 32px;
  text-align: center;
}

.gender-select p {
  font-size: 0.9rem;
  color: var(--ink-soft);
  margin-bottom: 12px;
}

.gender-btns {
  display: flex;
  gap: 12px;
  justify-content: center;
}

.gender-btn {
  padding: 10px 28px;
  border-radius: 24px;
  border: 1.5px solid var(--accent-light);
  background: transparent;
  color: var(--ink-soft);
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}

.gender-btn.active,
.gender-btn:hover {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}

.start-btn {
  padding: 16px 56px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 32px;
  font-size: 1.1rem;
  font-family: 'Noto Serif SC', serif;
  cursor: pointer;
  letter-spacing: 0.08em;
  box-shadow: 0 8px 32px rgba(124,92,191,0.35);
  transition: all 0.25s;
}

.start-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 40px rgba(124,92,191,0.45);
}

.cover-note {
  margin-top: 24px;
  font-size: 0.78rem;
  color: #aaa;
  line-height: 1.6;
}

/* ===== 测试页 ===== */
#test {
  display: none;
  min-height: 100vh;
  padding: 0 0 80px;
}

.test-header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: rgba(250,248,244,0.95);
  backdrop-filter: blur(10px);
  padding: 16px 24px 12px;
  border-bottom: 1px solid rgba(0,0,0,0.06);
}

.progress-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.progress-label {
  font-size: 0.82rem;
  color: var(--ink-soft);
}

.progress-count {
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--accent);
}

.progress-bar-track {
  height: 4px;
  background: rgba(124,92,191,0.12);
  border-radius: 4px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--gold));
  border-radius: 4px;
  transition: width 0.4s ease;
}

.section-title {
  text-align: center;
  padding: 32px 24px 8px;
  font-family: 'Noto Serif SC', serif;
  font-size: 1.1rem;
  color: var(--ink-soft);
  letter-spacing: 0.05em;
}

.section-dim-tag {
  display: inline-block;
  padding: 3px 14px;
  border-radius: 12px;
  font-size: 0.78rem;
  font-weight: 500;
  margin-left: 8px;
  vertical-align: middle;
}

.questions-wrap {
  max-width: 680px;
  margin: 0 auto;
  padding: 8px 20px 20px;
}

.q-card {
  background: white;
  border-radius: 16px;
  padding: 22px 24px;
  margin-bottom: 14px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  border-left: 4px solid transparent;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.q-card.answered {
  border-left-color: var(--accent-light);
}

.q-number {
  font-size: 0.72rem;
  color: #bbb;
  margin-bottom: 6px;
  letter-spacing: 0.05em;
}

.q-text {
  font-size: 1rem;
  line-height: 1.6;
  color: var(--ink);
  margin-bottom: 16px;
}

.scale-row {
  display: flex;
  align-items: center;
  gap: 0;
}

.scale-label {
  font-size: 0.72rem;
  color: #aaa;
  white-space: nowrap;
  flex-shrink: 0;
}

.scale-options {
  display: flex;
  gap: 6px;
  flex: 1;
  justify-content: center;
  margin: 0 10px;
}

.scale-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1.5px solid #e0e0e0;
  background: white;
  cursor: pointer;
  font-size: 0.85rem;
  font-weight: 500;
  color: #aaa;
  transition: all 0.18s;
  font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: center;
}

.scale-btn:hover {
  border-color: var(--accent-light);
  color: var(--accent);
  background: var(--accent-glow);
}

.scale-btn.selected {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
  box-shadow: 0 3px 12px rgba(124,92,191,0.35);
}

.page-nav {
  max-width: 680px;
  margin: 0 auto;
  padding: 8px 20px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.nav-btn {
  padding: 12px 32px;
  border-radius: 24px;
  border: 1.5px solid var(--accent-light);
  background: transparent;
  color: var(--accent);
  font-size: 0.95rem;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}

.nav-btn:hover:not(:disabled) {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

.nav-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.nav-btn.primary {
  background: var(--accent);
  color: white;
  box-shadow: 0 4px 20px rgba(124,92,191,0.3);
}

.nav-btn.primary:hover {
  box-shadow: 0 6px 28px rgba(124,92,191,0.45);
  transform: translateY(-1px);
}

.page-dots {
  display: flex;
  gap: 6px;
}

.page-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #e0e0e0;
  transition: all 0.2s;
}

.page-dot.active {
  background: var(--accent);
  transform: scale(1.3);
}

.page-dot.done {
  background: var(--accent-light);
}

/* ===== 结果页 ===== */
#result {
  display: none;
  min-height: 100vh;
  padding: 40px 20px 80px;
  background:
    radial-gradient(ellipse at 10% 10%, rgba(124,92,191,0.07) 0%, transparent 50%),
    var(--paper);
}

.result-inner {
  max-width: 640px;
  margin: 0 auto;
}

.result-header {
  text-align: center;
  margin-bottom: 40px;
}

.result-score-badge {
  display: inline-block;
  font-family: 'Noto Serif SC', serif;
  font-size: 1rem;
  letter-spacing: 0.12em;
  color: var(--accent);
  background: var(--accent-glow);
  border: 1px solid var(--accent-light);
  padding: 8px 24px;
  border-radius: 24px;
  margin-bottom: 20px;
}

.result-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.8rem;
  color: var(--ink);
  margin-bottom: 10px;
}

.result-subtitle {
  color: var(--ink-soft);
  font-size: 0.92rem;
  font-weight: 300;
}

/* 雷达图 */
.radar-wrap {
  background: white;
  border-radius: 20px;
  padding: 24px;
  margin-bottom: 24px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  display: flex;
  flex-direction: column;
  align-items: center;
}

.radar-wrap h3 {
  font-family: 'Noto Serif SC', serif;
  font-size: 1rem;
  color: var(--ink-soft);
  margin-bottom: 20px;
  align-self: flex-start;
}

canvas#radarChart {
  max-width: 320px;
  max-height: 320px;
}

/* 维度卡片 */
.dim-cards {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-bottom: 28px;
}

.dim-card {
  background: white;
  border-radius: 16px;
  padding: 20px 24px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  border-left: 5px solid transparent;
}

.dim-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.dim-name {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.05rem;
  font-weight: 600;
}

.dim-score-num {
  font-size: 1.5rem;
  font-weight: 700;
}

.dim-bar-track {
  height: 6px;
  background: #f0f0f0;
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 10px;
}

.dim-bar-fill {
  height: 100%;
  border-radius: 6px;
  transition: width 1s cubic-bezier(0.34,1.56,0.64,1);
}

.dim-level {
  font-size: 0.78rem;
  font-weight: 500;
  margin-bottom: 6px;
}

.dim-desc {
  font-size: 0.88rem;
  color: var(--ink-soft);
  line-height: 1.6;
  font-weight: 300;
}

/* 保存按钮 */
.save-area {
  text-align: center;
  padding-top: 8px;
}

.save-btn {
  padding: 15px 52px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 32px;
  font-size: 1rem;
  font-family: 'Noto Serif SC', serif;
  cursor: pointer;
  letter-spacing: 0.06em;
  box-shadow: 0 8px 32px rgba(124,92,191,0.35);
  transition: all 0.25s;
  margin-bottom: 12px;
  display: block;
  width: 100%;
  max-width: 320px;
  margin: 0 auto 12px;
}

.save-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 40px rgba(124,92,191,0.45);
}

.save-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.retry-btn {
  display: block;
  margin: 12px auto 0;
  background: none;
  border: none;
  color: #aaa;
  font-size: 0.85rem;
  cursor: pointer;
  font-family: inherit;
  text-decoration: underline;
}

.unanswered-tip {
  color: var(--danger);
  font-size: 0.85rem;
  text-align: center;
  margin-top: 8px;
  min-height: 20px;
}
</style>
</head>
<body>

<!-- ===== 封面 ===== -->
<div id="cover">
  <div class="cover-badge">IPIP 公共域题库 · 80题完整版</div>
  <h1 class="cover-title">探索你的<span>内在图谱</span></h1>
  <p class="cover-sub">基于大五人格（OCEAN）模型，这80道题将从五个维度为你绘制一幅真实的人格画像。没有好坏之分，只有独一无二的你。</p>

  <div class="ocean-row">
    <span class="ocean-tag tag-O">O 开放性</span>
    <span class="ocean-tag tag-C">C 尽责性</span>
    <span class="ocean-tag tag-E">E 外向性</span>
    <span class="ocean-tag tag-A">A 宜人性</span>
    <span class="ocean-tag tag-N">N 情绪稳定性</span>
  </div>

  <div class="gender-select">
    <p>选择你的性别（用于校准常模，不影响结果好坏）</p>
    <div class="gender-btns">
      <button class="gender-btn active" data-val="F" onclick="selectGender(this)">女</button>
      <button class="gender-btn" data-val="M" onclick="selectGender(this)">男</button>
      <button class="gender-btn" data-val="N" onclick="selectGender(this)">不透露</button>
    </div>
  </div>

  <button class="start-btn" onclick="startTest()">开始测试</button>
  <p class="cover-note">约需10-15分钟 · 题目基于IPIP公共域题库(ipip.ori.org) · 数据仅用于生成你的人格报告</p>
</div>

<!-- ===== 测试页 ===== -->
<div id="test">
  <div class="test-header">
    <div class="progress-info">
      <span class="progress-label" id="progressLabel">第1页 / 共12页</span>
      <span class="progress-count" id="progressCount">0 / 80 题已作答</span>
    </div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div class="section-title" id="sectionTitle"></div>

  <div class="questions-wrap" id="questionsWrap"></div>

  <div class="page-nav">
    <button class="nav-btn" id="prevBtn" onclick="changePage(-1)" disabled>← 上一页</button>
    <div class="page-dots" id="pageDots"></div>
    <button class="nav-btn primary" id="nextBtn" onclick="changePage(1)">下一页 →</button>
  </div>

  <p class="unanswered-tip" id="unansweredTip"></p>
</div>

<!-- ===== 结果页 ===== -->
<div id="result">
  <div class="result-inner">
    <div class="result-header">
      <div class="result-score-badge" id="scoreBadge">O··-C··-E··-A··-N··</div>
      <h2 class="result-title">你的人格图谱</h2>
      <p class="result-subtitle">每一种组合都是独一无二的你</p>
    </div>

    <div class="radar-wrap">
      <h3>五维度雷达图</h3>
      <canvas id="radarChart" width="320" height="320"></canvas>
    </div>

    <div class="dim-cards" id="dimCards"></div>

    <div class="save-area">
      <button class="save-btn" id="saveBtn" onclick="saveResult()">保存到我的档案</button>
      <button class="retry-btn" onclick="retryTest()">重新测试</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// 120道题（IPIP公共域，中文翻译）
// 每题格式：{ id, text, domain, keyed }
// domain: O/C/E/A/N  keyed: + 正向 / - 反向
// ============================================================
const QUESTIONS = [
  // ── E 外向性 (24题) ──
  {id:1,  text:"我在聚会上喜欢与很多人交谈",         domain:"E", keyed:"+"},
  {id:2,  text:"我很容易与陌生人建立联系",             domain:"E", keyed:"+"},
  {id:3,  text:"我喜欢成为大家关注的焦点",             domain:"E", keyed:"+"},
  {id:4,  text:"我总是感到充满活力与热情",             domain:"E", keyed:"+"},
  {id:5,  text:"我乐于主动发起对话",                   domain:"E", keyed:"+"},
  {id:6,  text:"我在社交场合感到自在",                 domain:"E", keyed:"+"},
  {id:7,  text:"我喜欢刺激、快节奏的活动",             domain:"E", keyed:"+"},
  {id:8,  text:"我很少感到无聊",                       domain:"E", keyed:"+"},
  {id:9,  text:"我倾向于保持安静，不爱抛头露面",       domain:"E", keyed:"-"},
  {id:10, text:"我在社交场合常常感到不自在",           domain:"E", keyed:"-"},
  {id:11, text:"我不喜欢成为众人目光的焦点",           domain:"E", keyed:"-"},
  {id:12, text:"我更喜欢独处而非参加聚会",             domain:"E", keyed:"-"},
  {id:13, text:"我在与人交谈时很少主动开口",           domain:"E", keyed:"-"},
  {id:14, text:"我不太擅长让人放松",                   domain:"E", keyed:"-"},
  {id:15, text:"我经常感到精力不足",                   domain:"E", keyed:"-"},
  {id:16, text:"我不会主动寻找刺激",                   domain:"E", keyed:"-"},
  {id:17, text:"我讲话富有感染力，态度积极",           domain:"E", keyed:"+"},
  {id:18, text:"我喜欢和很多不同类型的人相处",         domain:"E", keyed:"+"},
  {id:19, text:"参加热闹的活动让我感到愉悦",           domain:"E", keyed:"+"},
  {id:20, text:"我不介意独自一人待着",                 domain:"E", keyed:"-"},
  {id:21, text:"我很难在社交场合放松下来",             domain:"E", keyed:"-"},
  {id:22, text:"我喜欢把事情做得大张旗鼓",             domain:"E", keyed:"+"},
  {id:23, text:"我会主动寻找有趣的事情做",             domain:"E", keyed:"+"},
  {id:24, text:"我通常话不多",                         domain:"E", keyed:"-"},

  // ── A 宜人性 (24题) ──
  {id:25, text:"我在意别人的感受",                     domain:"A", keyed:"+"},
  {id:26, text:"我愿意为别人花时间",                   domain:"A", keyed:"+"},
  {id:27, text:"我体贴他人，富有同情心",               domain:"A", keyed:"+"},
  {id:28, text:"我对人真诚，愿意吐露心声",             domain:"A", keyed:"+"},
  {id:29, text:"我信任别人的善意",                     domain:"A", keyed:"+"},
  {id:30, text:"我有时会嘲讽别人",                     domain:"A", keyed:"-"},
  {id:31, text:"我有时对别人漠不关心",                 domain:"A", keyed:"-"},
  {id:32, text:"我在争吵中喜欢占上风",                 domain:"A", keyed:"-"},
  {id:33, text:"我有时会操控别人来达到目的",           domain:"A", keyed:"-"},
  {id:34, text:"我很少感受到对别人的爱",               domain:"A", keyed:"-"},
  {id:35, text:"我会帮助不认识的人",                   domain:"A", keyed:"+"},
  {id:36, text:"我相信人性本善",                       domain:"A", keyed:"+"},
  {id:37, text:"我容易宽恕别人的错误",                 domain:"A", keyed:"+"},
  {id:38, text:"我愿意为别人做出牺牲",                 domain:"A", keyed:"+"},
  {id:39, text:"我经常与别人发生口角",                 domain:"A", keyed:"-"},
  {id:40, text:"我对别人的问题感到不耐烦",             domain:"A", keyed:"-"},
  {id:41, text:"我有时会对别人粗鲁无礼",               domain:"A", keyed:"-"},
  {id:42, text:"我不容易感动",                         domain:"A", keyed:"-"},
  {id:43, text:"我喜欢帮助别人解决问题",               domain:"A", keyed:"+"},
  {id:44, text:"我真诚地关心他人的幸福",               domain:"A", keyed:"+"},
  {id:45, text:"我会主动安慰陷入困境的人",             domain:"A", keyed:"+"},
  {id:46, text:"我在待人接物上比较强硬",               domain:"A", keyed:"-"},
  {id:47, text:"我愿意分享自己的东西",                 domain:"A", keyed:"+"},
  {id:48, text:"我对别人的需求不太敏感",               domain:"A", keyed:"-"},

  // ── C 尽责性 (24题) ──
  {id:49, text:"我总是把事情做完",                     domain:"C", keyed:"+"},

  const domainLabel = domains.map(d => DIM_INFO[d].label).join(' · ');

  document.getElementById('sectionTitle').innerHTML =
    `第 ${page+1} 页 <span class="section-dim-tag" style="background:${dimColor}22;color:${dimColor};border:1px solid ${dimColor}55">${domainLabel}</span>`;

  const wrap = document.getElementById('questionsWrap');

    const card = document.createElement('div');
    card.className = 'q-card' + (answers[q.id] ? ' answered' : '');
    card.id = `qcard-${q.id}`;
    card.innerHTML = `
      <div class="q-number">题目 ${q.id} / 80</div>
      <div class="q-text">${q.text}</div>
      <div class="scale-row">
        <span class="scale-label">非常不同意</span>
        <div class="scale-options">
          ${[1,2,3,4,5].map(v => `

        </div>

function updateProgress() {
  const total = QUESTIONS_80.length;
  const answered = Object.keys(answers).length;
  document.getElementById('progressCount').textContent = `${answered} / ${total} 题已作答`;
  document.getElementById('progressFill').style.width = `${(answered/total)*100}%`;
  document.getElementById('progressLabel').textContent = `第 ${currentPage+1} 页 / 共 ${totalPages} 页`;
}

function updateNav() {
  document.getElementById('prevBtn').disabled = currentPage === 0;
  const isLast = currentPage === totalPages - 1;
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.textContent = isLast ? '查看结果 ✨' : '下一页 →';
  nextBtn.classList.toggle('primary', true);
}

function updateDots() {
  const dots = document.getElementById('pageDots');
  dots.innerHTML = '';
  for (let i = 0; i < totalPages; i++) {
    const d = document.createElement('div');
    d.className = 'page-dot' + (i === currentPage ? ' active' : (i < currentPage ? ' done' : ''));
    dots.appendChild(d);
  }
}

function changePage(dir) {
  const isLast = currentPage === totalPages - 1;

  if (dir === 1) {
    // 检查当前页是否全部作答
    const start = currentPage * PAGE_SIZE;
    const end = Math.min(start + PAGE_SIZE, QUESTIONS_80.length); // 修改点
    const pageQs = QUESTIONS_80.slice(start, end); // 修改点
    
    const unanswered = pageQs.filter(q => !answers[q.id]);
    if (unanswered.length > 0) {
      document.getElementById('unansweredTip').textContent =
        `本页还有 ${unanswered.length} 道题未作答，请全部完成后再继续`;
      document.getElementById(`qcard-${unanswered[0].id}`)?.scrollIntoView({ behavior:'smooth', block:'center' });
      return;
    }

    if (isLast) {
      showResult();
      return;
    }
  }

  const newPage = currentPage + dir;
  renderPage(newPage);
  updateDots();
}

// 计算得分（纯前端版，不依赖后端）

function calcScores() {
  const raw = { O:0, C:0, E:0, A:0, N:0 };
  const count = { O:0, C:0, E:0, A:0, N:0 };

  QUESTIONS_80.forEach(q => { // 修改点
    const val = answers[q.id];
    if (!val) return;
    const scored = q.keyed === '+' ? val : (6 - val);
    raw[q.domain] += scored;
    count[q.domain]++;
  });

  const result = {};
  for (const d in raw) {
    const min = count[d] * 1;
    const max = count[d] * 5;
    // 防止除以0，如果没有题目则默认为50分
    result[d] = count[d] > 0 ? Math.round(((raw[d] - min) / (max - min)) * 100) : 50;
  }
  return result;
}

function showResult() {
  const scores = calcScores();
  finalResult = scores;

  document.getElementById('test').style.display = 'none';

// ============================================================
// 雷达图（纯Canvas，不依赖Chart.js）
// ============================================================
function drawRadar(scores) {
  const canvas = document.getElementById('radarChart');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2;
  const R = Math.min(W, H) * 0.38;

  const labels = ['O 开放', 'C 尽责', 'E 外向', 'A 宜人', 'N 稳定'];
  const colors = ['var(--O)', 'var(--C)', 'var(--E)', 'var(--A)', 'var(--N)'];
  const hexColors = ['#5c8dd6','#56b888','#e8a44a','#e06b8b','#9b72cf'];
  const vals = [scores.O, scores.C, scores.E, scores.A, scores.N].map(v => v / 100);
  const n = 5;

  ctx.clearRect(0, 0, W, H);

  // 背景网格
  for (let ring = 1; ring <= 5; ring++) {
    const r = R * ring / 5;
    ctx.beginPath();
    for (let i = 0; i < n; i++) {
      const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
      const x = cx + r * Math.cos(angle);
      const y = cy + r * Math.sin(angle);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.strokeStyle = 'rgba(0,0,0,0.07)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // 轴线
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + R * Math.cos(angle), cy + R * Math.sin(angle));
    ctx.strokeStyle = 'rgba(0,0,0,0.1)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // 数据填充
  ctx.beginPath();
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const r = R * vals[i];
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = 'rgba(124,92,191,0.15)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(124,92,191,0.7)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // 数据点
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const r = R * vals[i];
    const x = cx + r * Math.cos(angle);
    const y = cy + r * Math.sin(angle);
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fillStyle = hexColors[i];
    ctx.fill();
  }

  // 标签
  ctx.font = `500 13px 'Noto Sans SC', sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const labelR = R + 28;
    const x = cx + labelR * Math.cos(angle);
    const y = cy + labelR * Math.sin(angle);
    ctx.fillStyle = hexColors[i];
    ctx.fillText(labels[i], x, y);
  }
}

    btn.textContent = '\u2713 \u5df2\u4fdd\u5b58\u5230\u6863\u6848';
    btn.style.background = '#56b888';

    // 3. \u663e\u793a\u5f97\u5206\u7801\u63d0\u793a

    if (!existing) {
      const tip = document.createElement('p');
      tip.className = 'bf-saved-tip';
      tip.style.cssText = 'text-align:center;margin-top:12px;color:#56b888;font-size:0.9rem;';

      btn.parentNode.appendChild(tip);
    }

    // 4. \u5982\u679c\u662f window.open \u6253\u5f00\u7684\uff0c\u901a\u77e5\u7236\u9875\u9762\u5e76\u5173\u95ed
    if (window.opener) {
      window.opener.postMessage({ type: 'BF_SAVED', score: scoreStr }, '*');
      setTimeout(() => window.close(), 1800);
    }

  } catch (e) {
    btn.disabled = false;
    btn.textContent = '\u4fdd\u5b58\u5230\u6211\u7684\u6863\u6848';
    alert('\u4fdd\u5b58\u5931\u8d25\uff1a' + e.message);
  }
}

function retryTest() {
  if (!confirm('确定要重新测试吗？当前结果将被清除。')) return;
  answers = {};
  finalResult = null;
  document.getElementById('result').style.display = 'none';
  document.getElementById('cover').style.display = 'flex';
}
</script>
