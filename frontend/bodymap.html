<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>身体地图 · 心晴</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap');

:root {
  --surface:   #0f0f2e;
  --glass:     rgba(255,255,255,0.04);
  --glass-b:   rgba(255,255,255,0.07);
  --accent:    #7c6cf0;
  --accent2:   #c084fc;
  --teal:      #4dd9c0;
  --white:     #e8e4ff;
  --muted:     rgba(200,190,255,0.55);
  --border:    rgba(180,160,255,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--surface);
  color: var(--white);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 15% 30%, rgba(124,108,240,0.15) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 70%, rgba(192,132,252,0.1) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 50%, rgba(77,217,192,0.05) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* ── 页面容器 ── */
#app {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 32px 20px 60px;
  max-width: 1100px;
  margin: 0 auto;
}

/* ── 顶部标题 ── */
.page-header {
  text-align: center;
  margin-bottom: 36px;
  width: 100%;
}

.page-eyebrow {
  font-size: 0.72rem;
  letter-spacing: 0.25em;
  color: var(--teal);
  opacity: 0.8;
  margin-bottom: 10px;
}

.page-title {
  font-family: 'Noto Serif SC', serif;
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  font-weight: 600;
  background: linear-gradient(135deg, var(--white) 30%, var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 10px;
}

.page-sub {
  font-size: 0.88rem;
  color: var(--muted);
  line-height: 1.7;
  max-width: 480px;
  margin: 0 auto;
}

/* ── 主布局 ── */
.main-layout {
  display: flex;
  gap: 32px;
  width: 100%;
  align-items: flex-start;
}

/* ── 人体图区域 ── */
.body-panel {
  flex: 0 0 300px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 24px;
}

.body-hint {
  font-size: 0.75rem;
  color: var(--muted);
  text-align: center;
  line-height: 1.6;
}

/* SVG 热区 */
.spot {
  cursor: pointer;
}
.spot-ring {
  fill: none;
  stroke: var(--accent);
  stroke-width: 1.5;
  stroke-dasharray: 4 3;
  opacity: 0;
  transition: opacity 0.3s, r 0.3s;
  r: 12;
}
.spot-dot {
  fill: var(--accent);
  opacity: 0.25;
  transition: all 0.25s;
  r: 8;
}
.spot:hover .spot-dot,
.spot.active .spot-dot {
  opacity: 0.7;
  r: 11;
}
.spot:hover .spot-ring,
.spot.active .spot-ring {
  opacity: 0.6;
  r: 16;
}
.spot.active .spot-dot {
  fill: var(--accent2);
  opacity: 0.85;
}
.spot-pulse {
  fill: var(--accent);
  opacity: 0;
  r: 8;
}
.spot.active .spot-pulse {
  animation: pulse-ring 1.8s ease-out infinite;
}
@keyframes pulse-ring {
  0%   { r: 8;  opacity: 0.5; }
  100% { r: 22; opacity: 0; }
}

/* ── 信息面板 ── */
.info-panel {
  flex: 1;
  min-width: 0;
}

.info-empty {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 48px 32px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

.info-empty-icon {
  font-size: 2.5rem;
  opacity: 0.4;
}

.info-empty-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 1rem;
  color: var(--muted);
}

.info-empty-sub {
  font-size: 0.82rem;
  color: rgba(200,180,255,0.35);
  line-height: 1.7;
}

/* 信息卡片 */
.info-card {
  display: none;
  flex-direction: column;
  gap: 20px;
  animation: fadeInUp 0.35s cubic-bezier(0.34,1.56,0.64,1);
}
.info-card.visible { display: flex; }

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* 区域名称 */
.zone-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.zone-icon {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, rgba(124,108,240,0.3), rgba(192,132,252,0.2));
  border: 1px solid rgba(124,108,240,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  flex-shrink: 0;
}

.zone-meta { flex: 1; }

.zone-name {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.1rem;
  font-weight: 600;
  color: #c4b5fd;
  margin-bottom: 3px;
}

.zone-tag {
  font-size: 0.72rem;
  color: var(--teal);
  background: rgba(77,217,192,0.1);
  border: 1px solid rgba(77,217,192,0.2);
  padding: 2px 10px;
  border-radius: 10px;
  display: inline-block;
}

/* 情绪描述 */
.emotion-block {
  background: rgba(124,108,240,0.08);
  border: 1px solid rgba(124,108,240,0.18);
  border-radius: 16px;
  padding: 18px 20px;
  position: relative;
}

.emotion-label {
  font-size: 0.72rem;
  color: #a78bfa;
  letter-spacing: 0.08em;
  margin-bottom: 10px;
  font-weight: 500;
}

.emotion-text {
  font-size: 0.9rem;
  color: rgba(230,220,255,0.88);
  line-height: 1.8;
}

/* 关怀建议 */
.care-section {}

.care-title {
  font-size: 0.78rem;
  color: var(--muted);
  letter-spacing: 0.06em;
  margin-bottom: 12px;
}

.care-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.care-item {
  display: flex;
  gap: 14px;
  align-items: flex-start;
  background: var(--glass-b);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  transition: border-color 0.2s, background 0.2s;
}

.care-item:hover {
  border-color: rgba(180,150,255,0.28);
  background: rgba(255,255,255,0.06);
}

.care-emoji {
  font-size: 1.3rem;
  flex-shrink: 0;
  line-height: 1.3;
}

.care-text {
  font-size: 0.88rem;
  color: rgba(220,210,255,0.82);
  line-height: 1.7;
}

/* ICP */
.icp-footer {
  margin-top: 40px;
  text-align: center;
  font-size: 0.72rem;
  color: rgba(200,180,255,0.25);
}
.icp-footer a { color: inherit; text-decoration: none; }
.icp-footer a:hover { color: rgba(200,180,255,0.5); }

/* ── 响应式 ── */
@media (max-width: 768px) {
  .main-layout { flex-direction: column; align-items: center; }
  .body-panel { position: static; flex: unset; width: 100%; max-width: 280px; }
  .info-panel { width: 100%; }
  .info-empty { padding: 32px 20px; }
}
</style>
</head>

let current = null;

function activate(key) {
  if (current) {
    document.getElementById('sp-' + current).classList.remove('active');
  }
  current = key;
  document.getElementById('sp-' + key).classList.add('active');

  const d = DATA[key];
  document.getElementById('zone-icon').textContent = d.icon;
  document.getElementById('zone-name').textContent = d.name;
  document.getElementById('zone-tag').textContent = d.tag;
  document.getElementById('zone-emotion').textContent = d.emotion;

  const list = document.getElementById('care-list');
  list.innerHTML = '';
  d.care.forEach(c => {
    list.innerHTML += `<div class="care-item"><div class="care-emoji">${c.e}</div><div class="care-text">${c.t}</div></div>`;
  });

  document.getElementById('info-empty').style.display = 'none';
  const card = document.getElementById('info-card');
  card.classList.remove('visible');
  void card.offsetWidth; // trigger reflow for animation
  card.classList.add('visible');
}
